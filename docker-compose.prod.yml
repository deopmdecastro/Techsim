services:
  backend:
    build:
      context: ./backend
      target: production
    environment:
      NODE_ENV: production
      PORT: 4000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: http://localhost:8080

  frontend:
    build:
      context: .
      target: production
    environment:
      VITE_API_URL: http://localhost:8080/api
      VITE_REALTIME_URL: http://localhost:8080

  nginx:
    volumes:
      - ./infra/nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
