services:
  backend:
    build:
      context: ./backend
      target: development
    command: npm run dev
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      PORT: 4000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: http://localhost:5173,http://localhost:8080

  frontend:
    build:
      context: .
      target: development
    command: npm run dev -- --host 0.0.0.0 --port 5173
    volumes:
      - ./:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8080/api
      VITE_REALTIME_URL: http://localhost:8080
    ports:
      - "5173:5173"

  nginx:
    volumes:
      - ./infra/nginx/default.dev.conf:/etc/nginx/conf.d/default.conf:ro
